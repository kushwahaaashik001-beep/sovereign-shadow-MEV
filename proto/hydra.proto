syntax = "proto3";

package hydra;

service HydraNetwork {
  rpc StreamOpportunities (stream RawOpportunity) returns (stream Empty);
}

message RawOpportunity {
  bytes tx_hash = 1;
  bytes pool_address = 2;
  bytes data_payload = 3;
  int64 timestamp = 4;
  uint64 gas_price = 5;
}

message Empty {}
